# API Laravel — api.gmim.web.id
# Simpan ke: /etc/nginx/sites-available/api.gmim.web.id
server {
    listen 80;
    listen [::]:80;
    server_name api.gmim.web.id;

    root /var/www/gmim_api/public;
    index index.php;

    # Upload bukti pemasukan maks 5 MB → beri sedikit kelonggaran
    client_max_body_size 8M;

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # File bukti yang di-symlink dari storage (php artisan storage:link)
    location /storage {
        try_files $uri =404;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # Jangan layani file tersembunyi (kecuali well-known untuk certbot)
    location ~ /\.(?!well-known).* {
        deny all;
    }

    access_log /var/log/nginx/api.gmim.web.id.access.log;
    error_log  /var/log/nginx/api.gmim.web.id.error.log;
}
