# Admin SPA (Vue) — admin.gmim.web.id
# Simpan ke: /etc/nginx/sites-available/admin.gmim.web.id
server {
    listen 80;
    listen [::]:80;
    server_name admin.gmim.web.id;

    root /var/www/gmim_admin/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    access_log /var/log/nginx/admin.gmim.web.id.access.log;
    error_log  /var/log/nginx/admin.gmim.web.id.error.log;
}
