# Manage SPA (Vue) — app.gmim.web.id
# Login, daftar, demo, /g/<slug>/*
# Simpan ke: /etc/nginx/sites-available/app.gmim.web.id
server {
    listen 80;
    listen [::]:80;
    server_name app.gmim.web.id;

    root /var/www/gmim_manage/dist;
    index index.html;

    # SPA: semua path di-fallback ke index.html (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Aset ber-hash → cache panjang
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    access_log /var/log/nginx/app.gmim.web.id.access.log;
    error_log  /var/log/nginx/app.gmim.web.id.error.log;
}
