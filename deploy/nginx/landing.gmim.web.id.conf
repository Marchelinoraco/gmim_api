# Landing page (statis) — gmim.web.id + www.gmim.web.id
# Simpan ke: /etc/nginx/sites-available/gmim.web.id
server {
    listen 80;
    listen [::]:80;
    server_name gmim.web.id www.gmim.web.id;

    root /var/www/gmim_landingpage;
    index index.html;

    # Halaman statis + modul ES (src/render.js diimpor index.html)
    location / {
        try_files $uri $uri/ =404;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    access_log /var/log/nginx/gmim.web.id.access.log;
    error_log  /var/log/nginx/gmim.web.id.error.log;
}
